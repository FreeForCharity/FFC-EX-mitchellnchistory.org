name: Deploy to GitHub Pages

on:
  # Runs after CI workflow completes successfully on main branch
  workflow_run:
    workflows: ['CI - Build and Test']
    types:
      - completed
    branches: ['main']

  # Allows manual deployment from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded or if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v6
        # Note: static_site_generator: next is intentionally NOT used here.
        # That option rewrites next.config.ts and strips settings like
        # trailingSlash. Our config already sets output, images, basePath,
        # and assetPrefix via NEXT_PUBLIC_BASE_PATH (see Detect base path step).

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Detect base path
        id: basepath
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          api_url = f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}/pages"
          req = urllib.request.Request(
              api_url,
              headers={
                  'Authorization': f"Bearer {os.environ['GITHUB_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  pages = json.load(resp)
          except urllib.error.HTTPError as exc:
              print(f"Failed to fetch Pages config: HTTP {exc.code}", file=sys.stderr)
              raise
          except urllib.error.URLError as exc:
              print(f"Failed to fetch Pages config: {exc}", file=sys.stderr)
              raise

          custom_domain = (pages.get('cname') or '').strip()
          if custom_domain:
              value = ''
              print(f"GitHub Pages custom domain configured: {custom_domain}")
          else:
              repo_name = os.environ['GITHUB_REPOSITORY'].split('/', 1)[1]
              value = f'/{repo_name}'
              print(f"GitHub Pages custom domain not configured; using project base path {value}")

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"value={value}\n")
          PY

      - name: Build with Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.value }}

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        timeout-minutes: 5
        run: |
          python3 - <<'PY'
          import os, sys, time, socket, urllib.request, urllib.error
          from urllib.parse import urljoin, urlparse

          def fetch(url, timeout_seconds):
            req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
            with urllib.request.urlopen(req, timeout=timeout_seconds) as resp:
              return resp.getcode(), resp.read().decode("utf-8", errors="replace"), resp.headers

          def fetch_binary(url, timeout_seconds):
            req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
            with urllib.request.urlopen(req, timeout=timeout_seconds) as resp:
              return resp.getcode(), resp.headers

          url = os.environ.get("DEPLOY_URL")
          if not url:
              print("DEPLOY_URL not set", file=sys.stderr)
              sys.exit(2)
          if not url.endswith("/"):
            url = f"{url}/"

          parsed = urlparse(url)
          base_path = parsed.path.rstrip("/")
          expected_about_path = f"{base_path}/about" if base_path else "/about"
          expected_asset_path = f"{base_path}/Images/mchs-logo.webp" if base_path else "/Images/mchs-logo.webp"
          about_url = urljoin(url, "about")
          asset_url = urljoin(url, "Images/mchs-logo.webp")

          total_wait_seconds = 180
          delay_seconds = 5
          timeout_seconds = 10
          deadline = time.monotonic() + total_wait_seconds
          attempt = 0
          last = None
          while True:
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              attempt += 1
              try:
                  req_timeout = min(timeout_seconds, remaining)
                  home_code, home_html, _ = fetch(url, req_timeout)
                  if home_code != 200:
                    raise RuntimeError(f"homepage returned HTTP {home_code}")
                  if expected_about_path not in home_html:
                    raise RuntimeError(f"homepage missing expected route reference {expected_about_path}")
                  if expected_asset_path not in home_html:
                    raise RuntimeError(f"homepage missing expected asset reference {expected_asset_path}")

                  about_code, _, _ = fetch(about_url, req_timeout)
                  if about_code != 200:
                    raise RuntimeError(f"about page returned HTTP {about_code}")

                  asset_code, asset_headers = fetch_binary(asset_url, req_timeout)
                  if asset_code != 200:
                    raise RuntimeError(f"asset returned HTTP {asset_code}")
                  asset_type = asset_headers.get_content_type()
                  if not asset_type.startswith("image/"):
                    raise RuntimeError(f"asset content type was {asset_type}")

                  print(
                    f"Attempt {attempt}: homepage=HTTP {home_code}, about=HTTP {about_code}, asset=HTTP {asset_code} ({asset_type})"
                  )
                  print("Smoke check passed")
                  sys.exit(0)
              except urllib.error.HTTPError as e:
                  last = f"HTTPError {e.code}"
                  print(f"Attempt {attempt}: HTTPError {e.code}")
                  e.close()
              except RuntimeError as e:
                  last = str(e)
                  print(f"Attempt {attempt} validation error: {e}")
              except (urllib.error.URLError, TimeoutError, socket.timeout) as e:
                  last = str(e)
                  print(f"Attempt {attempt} error: {e}")
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              time.sleep(min(delay_seconds, remaining))
          PY

  notify-failure:
    name: Notify on production deploy failure
    needs: [deploy]
    if: ${{ always() && needs.deploy.result == 'failure' && (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main') && (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create incident issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflowRun = context.payload && context.payload.workflow_run;
            const isWorkflowRun = Boolean(workflowRun);
            const deployRunUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const upstreamRunUrl = isWorkflowRun ? workflowRun.html_url : null;
            const sha = isWorkflowRun ? workflowRun.head_sha : context.sha;
            const branch = isWorkflowRun
              ? workflowRun.head_branch
              : (context.ref && context.ref.startsWith("refs/heads/") ? context.ref.substring("refs/heads/".length) : context.ref);

            const incidentLabelSpecs = [
              { name: "incident", color: "B60205" },
              { name: "deployment", color: "B60205" },
            ];
            const incidentLabels = incidentLabelSpecs.map((l) => l.name);
            const marker = "<!-- ffc-incident:prod-deploy-failure -->";

            // Best-effort: ensure labels exist without spamming 422s every run.
            try {
              const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner,
                repo,
                per_page: 100,
              });
              const existingNames = new Set((existing || []).map((l) => l && l.name).filter(Boolean));
              for (const spec of incidentLabelSpecs) {
                if (existingNames.has(spec.name)) continue;
                try {
                  await github.rest.issues.createLabel({ owner, repo, name: spec.name, color: spec.color });
                } catch (e) {
                  core.warning(`Could not create label "${spec.name}": ${e && e.message ? e.message : e}`);
                }
              }
            } catch (e) {
              core.warning(`Could not list/create labels: ${e && e.message ? e.message : e}`);
            }

            const title = `Production deployment failed (${branch})`;
            const bodyLines = [
              `Deploy run: ${deployRunUrl}`,
            ];
            if (upstreamRunUrl) {
              bodyLines.push(`Upstream run: ${upstreamRunUrl}`);
            }
            bodyLines.push(
              "",
              `Ref: ${branch}`,
              `SHA: ${sha}`,
              "",
              marker,
              "_This issue was automatically created by the deploy workflow._"
            );
            const body = bodyLines.join("\n");

            async function findDuplicateIssueNumber() {
              const escapedTitle = title.replace(/"/g, "\\\"");
              const q = `repo:${owner}/${repo} is:issue is:open in:title "${escapedTitle}"`;
              try {
                const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
                const items = (res && res.data && res.data.items) ? res.data.items : [];
                const matches = items.filter((item) => !item.pull_request && (item.title || "") === title);
                for (const m of matches) {
                  try {
                    const full = await github.rest.issues.get({ owner, repo, issue_number: m.number });
                    const fullBody = (full && full.data && full.data.body) ? full.data.body : "";
                    if (fullBody.includes(marker)) return m.number;
                  } catch (e) {
                    core.warning(`Could not validate possible duplicate issue body: ${e && e.message ? e.message : e}`);
                  }
                }
              } catch (e) {
                core.warning(`Search API failed for dedupe: ${e && e.message ? e.message : e}`);
              }

              // Fallback: page through open issues (bounded) and match by title + marker.
              try {
                const perPage = 100;
                const maxPages = 10;
                for (let page = 1; page <= maxPages; page++) {
                  const list = await github.rest.issues.listForRepo({
                    owner,
                    repo,
                    state: "open",
                    per_page: perPage,
                    page,
                  });
                  const data = (list && list.data) ? list.data : [];
                  const openIssues = data.filter((item) => !item.pull_request);
                  const dup = openIssues.find((issue) => (issue.title || "") === title && (issue.body || "").includes(marker));
                  if (dup) return dup.number;
                  if (data.length < perPage) break;
                }
                return null;
              } catch (e) {
                core.warning(`Could not list existing issues for dedupe: ${e && e.message ? e.message : e}`);
                return null;
              }
            }

            const duplicateNumber = await findDuplicateIssueNumber();
            if (duplicateNumber) {
              core.info(`Incident issue #${duplicateNumber} already exists; adding a comment.`);
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: duplicateNumber,
                  body: [
                    "Another deployment failure was detected:",
                    "",
                    body,
                  ].join("\n"),
                });
              } catch (e) {
                core.warning(`Could not comment on incident issue: ${e && e.message ? e.message : e}`);
              }
              return;
            }

            let created;
            try {
              created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: incidentLabels,
              });
            } catch (e) {
              core.warning(`Could not create labeled incident issue: ${e && e.message ? e.message : e}`);
              try {
                created = await github.rest.issues.create({ owner, repo, title, body });
              } catch (e2) {
                core.warning(`Could not create incident issue: ${e2 && e2.message ? e2.message : e2}`);
                return;
              }
            }

            core.info(`Created incident issue #${created.data.number}`);
